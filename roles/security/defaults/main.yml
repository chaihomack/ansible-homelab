---
security_sshd_conf_general: |
  PermitRootLogin yes
  PermitEmptyPasswords no

security_users:
  - username: ansible
    sshd_conf_block: |-
      PubkeyAuthentication yes
      PasswordAuthentication no


security_ufw_allowed_tcp_ports:
  - "22"
  - "80"
  - "443"

security_ufw_allowed_udp_ports:
  - "68"

security_ufw_policy: deny
