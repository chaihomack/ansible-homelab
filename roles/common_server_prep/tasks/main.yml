---
- name: Update apt cache and upgrade packages
  become: true
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    autoremove: true
    autoclean: true

- name: Check if reboot is required
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required_file

- name: finding out if reboot is required 
  ansible.builtin.debug:
    msg: "!!! REBOOT IS REQUIRED, DO IT WITH YOURSELF !!!"
  when: reboot_required_file.stat.exists

- name: Cleanup Docker (prune everything)
  community.docker.docker_prune:
    containers: true
    images: true
    networks: true
    volumes: true
    builder_cache: true
  when: inventory_hostname in groups['gateway'] or inventory_hostname in groups['main_app_server']

- name: Install common packages
  become: true
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
    update_cache: true
