---
- name: Install dnsmasq
  ansible.builtin.apt:
    name: dnsmasq
    state: present
    update_cache: true

- name: Template config to host
  ansible.builtin.template:
    src: "{{ role_path }}/templates/dnsmasq.conf.j2"
    dest: /etc/dnsmasq.conf
    owner: root
    group: root
    mode: "0600"

- name: Restart dnsmasq sevice
  ansible.builtin.systemd_service:
    name: dnsmasq
    state: restarted
  changed_when: false
