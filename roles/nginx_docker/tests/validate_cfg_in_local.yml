---
- name: (VALIDATING /templates/ LOCALLY) Create temporary build directory for config validation
  ansible.builtin.tempfile:
    state: directory
    suffix: build
  register: tmp_dir

- name: (VALIDATING /templates/ LOCALLY) Create dirs with everything from templates
  ansible.builtin.file:
    path: '{{ tmp_dir.path }}/{{ item.path }}'
    state: directory
    mode: '{{ item.mode }}'
  with_community.general.filetree: '{{ templates_dir }}'
  when: item.state == 'directory'

- name: (VALIDATING /templates/ LOCALLY) templating cfgs to testing dir
  ansible.builtin.template:
    src: '{{ item.src }}'
    dest: '{{ tmp_dir.path }}/{{ item.path | splitext | first }}' # also removes .j2
    mode: '{{ item.mode }}'
  with_community.general.filetree: '{{ templates_dir }}'
  when: item.state == 'file'

- name: (VALIDATING /templates/ LOCALLY) Validate nginx conf locally
  ansible.builtin.command:
    cmd: >
      docker run --rm -t
      -v "{{ tmp_dir.path }}/nginx/conf.d/:/etc/nginx/conf.d/:ro"
      -v "{{ tmp_dir.path }}/nginx/sites-enabled/:/etc/nginx/sites-enabled/:ro"
      nginx:latest nginx -t

